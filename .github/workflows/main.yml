name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Lua Language Server
        run: |
          curl -L "https://github.com/LuaLS/lua-language-server/releases/download/3.17.1/lua-language-server-3.17.1-linux-x64.tar.gz" -o lua-ls.tar.gz
          mkdir -p lua-ls
          tar -xzf lua-ls.tar.gz -C lua-ls
          sudo mv lua-ls /opt/lua-language-server
          sudo ln -s /opt/lua-language-server/bin/lua-language-server /usr/local/bin/lua-language-server
      - name: Run lint
        run: ./scripts/check.sh

  build-and-publish:
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build all
        run: ./scripts/build.sh all
      - name: Publish to Itch
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          curl -L "https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default" -o butler.zip
          unzip butler.zip
          sudo mv butler /usr/local/bin/butler
          sudo chmod +x /usr/local/bin/butler
          ./scripts/publish.sh
